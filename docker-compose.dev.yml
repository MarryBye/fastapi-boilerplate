version: "3.9"

services:
  db:
    container_name: postgres_db
    image: postgres:16
    restart: always
    env_file:
      - ./config/.env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: fastapi_app
    build: .
    restart: always
    env_file:
      - ./config/.env.dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data: